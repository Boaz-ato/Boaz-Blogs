baseURL: "https://boaz-ato.github.io/Boaz-Blogs/"
locale: en-us
title: "Boaz Blogs"

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search

params:
  navbar:
    displayTitle: true
    displayLogo: false
    width: wide
  page:
    width: wide
  theme:
    default: light
    displayToggle: true
  search:
    enable: true
    type: flexsearch
  footer:
    displayCopyright: true
    displayPoweredBy: false
  editURL:
    enable: false
